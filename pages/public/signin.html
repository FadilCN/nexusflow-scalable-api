<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
    <div class="logo">Nexus Flow</div>
    <nav class="top-nav">
        <a href="#">Support</a>
        <a href="#">Contact</a>
    </nav>
</header>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Sign In</h2>
                <p>Enter your credentials to continue</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">Email</label>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="toggle-icon"></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <div class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" class="checkbox-label">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Don't have an account? <a href="/signup.html">Create one</a></p>
            </div>

            <div class="success-message" id="successMessage" style="display: none;">
                <div class="success-icon">✓</div>
                <h3>Welcome back!</h3>
                <p id="statusText">Redirecting to your dashboard...</p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const successMessage = document.getElementById('successMessage');
        const statusText = document.getElementById('statusText');
        const passwordToggle = document.getElementById('passwordToggle');

        // Toggle Password Visibility
        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordToggle.classList.toggle('visible');
        });

        // Form Submission Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                email: emailInput.value,
                password: passwordInput.value
            };

            try {
                const response = await fetch('auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Hide form and show success UI
                    loginForm.style.display = 'none';
                    successMessage.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'auth/home';
                    }, 1500); 
                } else {
                    // Show error on the email error span or an alert
                    document.getElementById('emailError').textContent = "Invalid credentials. Please try again.";
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('emailError').textContent = "Something went wrong. Please try again later.";
            }
        });
    </script>
</body>
</html>

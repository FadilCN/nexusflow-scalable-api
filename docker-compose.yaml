version: "1.0"

services:
  backend:
    build: .
    container_name: nodejs_backend
    restart: always
    depends_on:
      - redis
      - rabbitmq
    networks:
      - backend
    #ports:
    # - "3000:3000"
    env_file:
      - .env
    environment:
      - JWT_KEY=${JWT_KEY}
      - MONGO_URI=${MONGO_URI}
    
  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: always
    networks:
      - backend
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.11.8-management-alpine
    container_name: rabbitmq
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
    restart: always
    networks:
      - backend
    ports:
      - "5672:5672"
      - "15672:15672"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - backend

networks:
  backend: